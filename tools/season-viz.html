function render(list) {
  const grid = document.getElementById('videoGrid');
  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>未找到匹配的视频</p></div>';
    document.getElementById('resultCount').textContent = '共 0 个视频';
    return;
  }
  grid.innerHTML = list.map((v, i) => {
    const sourceTag = v.source
      ? `<span class="tag-source">${v.source}</span>`
      : '<span class="tag-unidentified">未识别剧集</span>';
    return `
    <a class="card" href="${v.link}" target="_blank" rel="noopener" data-index="${i}">
      <div class="thumb-wrap">
        <img src="${v.pic_https}" alt="${v.title}" loading="lazy">
        <span class="badge-bvid">${v.bvid}</span>
        <span class="badge-duration">${v.duration_fmt}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <div class="meta-row">
            <span class="meta-stat">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
              ${v.view_fmt}
            </span>
            <span class="meta-stat">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
              ${v.danmaku_fmt}
            </span>
          </div>
          <div class="meta-row">
            <span class="card-date">${v.date_fmt}</span>
            ${sourceTag}
          </div>
        </div>
      </div>
    </a>
  `}).join('');
  document.getElementById('resultCount').textContent = `共 ${list.length} 个视频`;
}

function sort(list, mode) {
  const arr = [...list];
  switch(mode) {
    case 'views-desc': return arr.sort((a,b) => b.stat.view - a.stat.view);
    case 'views-asc': return arr.sort((a,b) => a.stat.view - b.stat.view);
    case 'date-desc': return arr.sort((a,b) => b.pubdate - a.pubdate);
    case 'date-asc': return arr.sort((a,b) => a.pubdate - b.pubdate);
    case 'season-asc': return arr.sort((a,b) => {
      if (a.season !== b.season) return (a.season || 999) - (b.season || 999);
      return (a.episode || 999) - (b.episode || 999);
    });
    case 'title': return arr.sort((a,b) => a.title.localeCompare(b.title, 'zh-CN'));
    default: return arr;
  }
}

let currentList = [...videos];
let activeSeason = 'all';
render(currentList);

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let filtered = videos.filter(v => {
    const matchSearch = !q || v.title.toLowerCase().includes(q) || v.bvid.toLowerCase().includes(q) || (v.source && v.source.toLowerCase().includes(q));
    let matchSeason = true;
    if (activeSeason === 'unidentified') {
      matchSeason = !v.source;
    } else if (activeSeason !== 'all') {
      matchSeason = String(v.season) === activeSeason;
    }
    return matchSearch && matchSeason;
  });
  const sorted = sort(filtered, document.getElementById('sortSelect').value);
  currentList = sorted;
  render(sorted);
}

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);

document.getElementById('seasonBar').addEventListener('click', (e) => {
  if (e.target.classList.contains('season-btn')) {
    document.querySelectorAll('.season-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    activeSeason = e.target.dataset.season;
    applyFilters();
  }
});
</script>
